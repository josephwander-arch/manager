<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPC Dashboard</title>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-card: #1a1d27;
  --bg-card-hover: #242836;
  --text-primary: #e4e4e7;
  --text-secondary: #9ca3af;
  --accent-green: #22c55e;
  --accent-blue: #3b82f6;
  --accent-red: #ef4444;
  --accent-amber: #f59e0b;
  --accent-grey: #6b7280;
  --accent-purple: #a855f7;
  --border: #2d3140;
  --font: 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); font-size: 13px; line-height: 1.5; }
a { color: var(--accent-blue); text-decoration: none; }

/* Layout */
#app { display: flex; flex-direction: column; min-height: 100vh; }
#health-strip { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
#toolbar { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 6px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#main { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
#panels-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
#services-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
#autonomous-row { }
#action-bar { background: var(--bg-card); border-top: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* Health strip */
.server-pill { display: flex; align-items: center; gap: 5px; font-size: 12px; }
.server-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.dot-offline { background: var(--accent-grey); }
.dot-warn { background: var(--accent-amber); }
.server-name { color: var(--text-primary); font-weight: 500; }
.server-ver { color: var(--text-secondary); font-size: 11px; }
.server-age { color: var(--text-secondary); font-size: 11px; }

/* Toolbar */
.tab-group { display: flex; gap: 2px; background: var(--bg-primary); border-radius: 6px; padding: 2px; }
.tab { padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--text-secondary); border: none; background: transparent; }
.tab.active { background: var(--bg-card-hover); color: var(--text-primary); }
.filter-group { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.chip { padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 11px; }
.chip.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(59,130,246,0.1); }
.chip.running { border-color: var(--accent-green); }
.chip.running.active { color: var(--accent-green); background: rgba(34,197,94,0.1); border-color: var(--accent-green); }
.chip.failed { border-color: var(--accent-red); }
.chip.failed.active { color: var(--accent-red); background: rgba(239,68,68,0.1); border-color: var(--accent-red); }
.chip.orphaned { border-color: var(--accent-amber); }
.chip.orphaned.active { color: var(--accent-amber); background: rgba(245,158,11,0.1); }
select.filter-select { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font-size: 11px; }
.group-toggle { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); cursor: pointer; }
.group-toggle input { cursor: pointer; }

/* Panel */
.panel { background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.panel-header { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between; }
.panel-body { padding: 8px; max-height: 340px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Session card */
.session-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; cursor: pointer; transition: border-color 0.15s; }
.session-card:hover { border-color: var(--accent-blue); background: var(--bg-card-hover); }
.session-card.stalled { border-color: var(--accent-amber); }
.session-card.orphaned-card { border-color: var(--accent-amber); }
.session-card.faded { opacity: 0.45; }
.session-card.collapsed { display: none; }
.card-row { display: flex; align-items: center; gap: 6px; }
.card-title { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge { padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge-running { background: rgba(34,197,94,0.15); color: var(--accent-green); }
.badge-queued { background: rgba(107,114,128,0.15); color: var(--accent-grey); }
.badge-done { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
.badge-failed { background: rgba(239,68,68,0.15); color: var(--accent-red); }
.badge-orphaned { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
.badge-cancelled { background: rgba(107,114,128,0.15); color: var(--accent-grey); }
.badge-claude { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
.badge-codex { background: rgba(34,197,94,0.15); color: var(--accent-green); }
.badge-gemini { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
.badge-gpt { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
.card-meta { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.elapsed { font-variant-numeric: tabular-nums; }
.card-prompt { font-size: 11px; color: var(--text-secondary); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.card-detail { font-size: 11px; color: var(--text-secondary); margin-top: 4px; display: none; }
.session-card.expanded .card-detail { display: block; }

/* Breadcrumb card */
.bc-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; }
.bc-card.stale { border-color: var(--accent-amber); box-shadow: 0 0 8px rgba(245,158,11,0.15); }
.bc-progress-bar { height: 5px; background: var(--border); border-radius: 3px; margin: 5px 0; overflow: hidden; }
.bc-progress-fill { height: 100%; background: var(--accent-blue); border-radius: 3px; transition: width 0.3s; }
.bc-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 10px; flex-wrap: wrap; margin-top: 3px; }

/* Scorecard */
.scorecard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
.scorecard-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 8px; }
.scorecard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.score-item { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
.score-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
.score-value { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.score-value.warn { color: var(--accent-amber); }
.score-value.good { color: var(--accent-green); }

/* Service panels */
.service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; padding: 8px 12px; }
.svc-label { font-size: 11px; color: var(--text-secondary); }
.svc-value { font-size: 11px; color: var(--text-primary); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.svc-url { font-size: 11px; max-width: 160px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

/* Action bar */
.action-btn { padding: 5px 12px; background: var(--bg-card-hover); border: 1px solid var(--border); color: var(--text-primary); border-radius: 5px; cursor: pointer; font-size: 12px; transition: border-color 0.15s; }
.action-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.action-btn.danger:hover { border-color: var(--accent-red); color: var(--accent-red); }
.path-copyable { font-size: 11px; color: var(--text-secondary); background: var(--bg-primary); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; font-family: monospace; }
.path-copyable:hover { border-color: var(--accent-blue); }
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--accent-green); color: var(--text-primary); padding: 8px 14px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
.toast.show { opacity: 1; }
.project-header { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 2px 2px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }

/* Empty state */
.empty-state { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 12px; }

/* Offline banner */
.offline-card { text-align: center; padding: 16px; color: var(--accent-grey); font-size: 12px; border: 1px dashed var(--border); border-radius: 6px; margin: 4px; }

/* View modes */
body.view-ops #services-row, body.view-ops #autonomous-row { display: block; }
body.view-summary #panels-row, body.view-summary #services-row, body.view-summary #autonomous-row { display: none; }
</style>
</head>
<body class="view-full">
<div id="app">

<!-- Health Strip -->
<div id="health-strip">
  <strong style="font-size:12px;color:var(--text-secondary);margin-right:4px;">CPC</strong>
  <div id="strip-manager" class="server-pill"><span class="server-dot dot-offline"></span><span class="server-name">manager</span><span class="server-ver"></span><span class="server-age"></span></div>
  <div id="strip-local" class="server-pill"><span class="server-dot dot-offline"></span><span class="server-name">local</span><span class="server-ver"></span><span class="server-age"></span></div>
  <div id="strip-hands" class="server-pill"><span class="server-dot dot-offline"></span><span class="server-name">hands</span><span class="server-ver"></span><span class="server-age"></span></div>
  <div id="strip-workflow" class="server-pill"><span class="server-dot dot-offline"></span><span class="server-name">workflow</span><span class="server-ver"></span><span class="server-age"></span></div>
  <div id="strip-autonomous" class="server-pill"><span class="server-dot dot-offline"></span><span class="server-name">autonomous</span><span class="server-ver"></span><span class="server-age"></span></div>
  <span id="last-refresh" style="margin-left:auto;font-size:11px;color:var(--text-secondary)"></span>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <div class="tab-group">
    <button class="tab active" onclick="setView('full')">Full</button>
    <button class="tab" onclick="setView('ops')">Ops</button>
    <button class="tab" onclick="setView('summary')">Summary</button>
  </div>
  <label class="group-toggle"><input type="checkbox" id="groupByProject" onchange="renderAll()"> Group by project</label>
  <div class="filter-group">
    <span style="font-size:11px;color:var(--text-secondary)">Filter:</span>
    <button class="chip" id="chip-all" onclick="setStatusFilter('all')">All</button>
    <button class="chip running" id="chip-running" onclick="setStatusFilter('running')">● Running</button>
    <button class="chip" id="chip-queued" onclick="setStatusFilter('queued')">○ Queued</button>
    <button class="chip" id="chip-done" onclick="setStatusFilter('done')">✓ Done</button>
    <button class="chip failed" id="chip-failed" onclick="setStatusFilter('failed')">✗ Failed</button>
    <button class="chip orphaned" id="chip-orphaned" onclick="setStatusFilter('orphaned')">⚠ Orphaned</button>
    <select class="filter-select" id="backendFilter" onchange="renderAll()">
      <option value="all">All backends</option>
      <option value="claude_code">claude_code</option>
      <option value="codex">codex</option>
      <option value="gemini">gemini</option>
      <option value="gpt">gpt</option>
    </select>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- Sessions + Breadcrumbs -->
  <div id="panels-row">
    <div class="panel">
      <div class="panel-header">
        <span>Sessions &amp; Tasks</span>
        <span id="session-count" style="font-size:10px;color:var(--text-secondary)"></span>
      </div>
      <div class="panel-body" id="sessions-panel"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span>Breadcrumbs</span>
        <span id="bc-count" style="font-size:10px;color:var(--text-secondary)"></span>
      </div>
      <div class="panel-body" id="breadcrumbs-panel"></div>
    </div>
  </div>

  <!-- Scorecard -->
  <div class="scorecard" id="scorecard-panel">
    <div class="scorecard-title">Today's Scorecard</div>
    <div class="scorecard-grid" id="scorecard-grid"></div>
  </div>

  <!-- Hands + Workflow -->
  <div id="services-row">
    <div class="panel" id="hands-panel">
      <div class="panel-header"><span>🌐 Hands</span><span id="hands-age" style="font-size:10px;color:var(--text-secondary)"></span></div>
      <div class="service-grid" id="hands-grid"></div>
    </div>
    <div class="panel" id="workflow-panel">
      <div class="panel-header"><span>🔑 Workflow</span><span id="workflow-age" style="font-size:10px;color:var(--text-secondary)"></span></div>
      <div class="service-grid" id="workflow-grid"></div>
    </div>
  </div>

  <!-- Autonomous -->
  <div class="panel" id="autonomous-panel" style="display:none">
    <div class="panel-header"><span>📚 Autonomous</span><span id="autonomous-age" style="font-size:10px;color:var(--text-secondary)"></span></div>
    <div class="service-grid" id="autonomous-grid"></div>
  </div>

</div><!-- /main -->

<!-- Action bar -->
<div id="action-bar">
  <button class="action-btn" onclick="doAction('clean_old')">Clean .exe.old</button>
  <span class="path-copyable" onclick="copyText('C:\\\\My Drive\\\\Volumes')" title="Click to copy">📁 C:\My Drive\Volumes</span>
  <button class="action-btn" id="github-btn" onclick="toggleGitHub()">GitHub ▾</button>
  <div id="github-menu" style="display:none;position:absolute;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px;z-index:100;bottom:44px;right:16px;font-size:12px;min-width:180px;">
    <div style="padding:3px 8px;cursor:pointer;color:var(--text-primary)" onclick="openGH('manager')">📦 manager</div>
    <div style="padding:3px 8px;cursor:pointer;color:var(--text-primary)" onclick="openGH('local')">📦 local (mcp-windows)</div>
    <div style="padding:3px 8px;cursor:pointer;color:var(--text-primary)" onclick="openGH('hands')">📦 hands (browser-mcp)</div>
    <div style="padding:3px 8px;cursor:pointer;color:var(--text-primary)" onclick="openGH('workflow')">📦 workflow</div>
    <div style="padding:3px 8px;cursor:pointer;color:var(--text-primary)" onclick="openGH('autonomous')">📦 autonomous</div>
  </div>
  <span id="action-status" style="font-size:11px;color:var(--text-secondary);margin-left:auto"></span>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// State
// ============================================================
const state = {
  config: null,
  servers: { manager: null, local: null, hands: null, workflow: null, autonomous: null },
  lastSeen: {},
  statusFilter: 'all',
  view: 'full',
  startTimes: {}, // task_id -> Date (for live timers)
};

const GITHUB_ORG = 'josephwander-arch';
const GITHUB_REPOS = {
  manager: 'manager', local: 'mcp-windows', hands: 'browser-mcp',
  workflow: 'workflow', autonomous: 'autonomous'
};

// ============================================================
// Boot
// ============================================================
async function boot() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    state.config = cfg;
  } catch(e) {
    state.config = {
      ports: { manager: location.port || 9100, local: 9101, hands: 9102, workflow: 9103, autonomous: 9104 },
      poll_intervals_ms: { manager: 5000, local: 5000, hands: 5000, workflow: 42000, autonomous: 42000 }
    };
  }
  startPolling();
  setInterval(updateElapsedTimers, 1000);
}

function startPolling() {
  const cfg = state.config;
  const ports = cfg.ports;
  const intervals = cfg.poll_intervals_ms;

  pollServer('manager', `http://127.0.0.1:${ports.manager}/api/status`, intervals.manager);
  pollServer('local',   `http://127.0.0.1:${ports.local}/api/status`,   intervals.local);
  pollServer('hands',   `http://127.0.0.1:${ports.hands}/api/status`,   intervals.hands);
  pollServer('workflow',`http://127.0.0.1:${ports.workflow}/api/status`, intervals.workflow);
  pollServer('autonomous',`http://127.0.0.1:${ports.autonomous}/api/status`, intervals.autonomous);
}

async function pollServer(name, url, intervalMs) {
  async function doFetch() {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(4000) });
      if (r.ok) {
        const data = await r.json();
        state.servers[name] = data;
        state.lastSeen[name] = Date.now();
      } else {
        state.servers[name] = { _error: r.status };
      }
    } catch(e) {
      // offline — keep last data but note time
    }
    renderAll();
  }
  doFetch();
  setInterval(doFetch, intervalMs);
}

// ============================================================
// View/Filter
// ============================================================
function setView(v) {
  state.view = v;
  document.body.className = `view-${v}`;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}

function setStatusFilter(f) {
  state.statusFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById(`chip-${f}`)?.classList.add('active');
  renderAll();
}

// ============================================================
// Render all
// ============================================================
function renderAll() {
  renderHealthStrip();
  renderSessions();
  renderBreadcrumbs();
  renderScorecard();
  renderHandsPanel();
  renderWorkflowPanel();
  renderAutonomousPanel();
  document.getElementById('last-refresh').textContent = `updated ${new Date().toLocaleTimeString()}`;
}

// ============================================================
// Health strip
// ============================================================
function renderHealthStrip() {
  const servers = ['manager','local','hands','workflow','autonomous'];
  servers.forEach(name => {
    const el = document.getElementById(`strip-${name}`);
    const dot = el.querySelector('.server-dot');
    const ver = el.querySelector('.server-ver');
    const age = el.querySelector('.server-age');
    const data = state.servers[name];
    const seen = state.lastSeen[name];

    if (seen) {
      const secAgo = Math.floor((Date.now() - seen) / 1000);
      age.textContent = secAgo < 5 ? ' ●' : ` ${secAgo}s ago`;
    }

    if (data && !data._error) {
      dot.className = 'server-dot dot-online';
      const v = data.version || '';
      ver.textContent = v ? ` v${v}` : '';
    } else if (seen) {
      dot.className = 'server-dot dot-warn';
      ver.textContent = ' (offline)';
    } else {
      dot.className = 'server-dot dot-offline';
      ver.textContent = '';
    }
  });
}

// ============================================================
// Sessions panel
// ============================================================
function renderSessions() {
  const panel = document.getElementById('sessions-panel');
  const data = state.servers.manager;
  if (!data || !data.tasks) {
    panel.innerHTML = '<div class="offline-card">Manager offline — no data</div>';
    document.getElementById('session-count').textContent = '';
    return;
  }

  let tasks = data.tasks || [];
  const statusF = state.statusFilter;
  const backendF = document.getElementById('backendFilter')?.value || 'all';

  if (statusF !== 'all') tasks = tasks.filter(t => t.status === statusF);
  if (backendF !== 'all') tasks = tasks.filter(t => t.backend === backendF || t.backend === backendF.replace('_','-'));

  const groupByProject = document.getElementById('groupByProject')?.checked;
  const sessions = data.sessions || {};
  const countBadge = `${sessions.running||0}▶ ${sessions.queued||0}○ ${sessions.done||0}✓`;
  document.getElementById('session-count').textContent = countBadge;

  if (tasks.length === 0) {
    panel.innerHTML = '<div class="empty-state">No sessions match filters</div>';
    return;
  }

  const now = Date.now();

  function renderCard(t) {
    const statusBadge = `<span class="badge badge-${t.status}">${t.status}</span>`;
    const backendKey = t.backend?.replace('claude_code','claude');
    const backendBadge = `<span class="badge badge-${backendKey||'gpt'}">${t.backend||'?'}</span>`;
    const orphanBadge = t.orphaned ? '<span class="badge badge-orphaned">ORPHANED</span>' : '';

    // Elapsed
    let elapsed = '';
    if (t.started_at && (t.status === 'running' || t.status === 'queued')) {
      state.startTimes[t.id] = new Date(t.started_at).getTime();
      elapsed = `<span class="elapsed" data-start="${t.started_at}" id="elapsed-${t.id}">…</span>`;
    } else if (t.started_at && t.completed_at) {
      const ms = new Date(t.completed_at) - new Date(t.started_at);
      elapsed = `<span>${fmtDuration(ms)}</span>`;
    }

    // Stall check
    const stalled = t.last_activity && t.status === 'running' &&
      (now - new Date(t.last_activity).getTime()) > 120000;

    const stepsInfo = t.progress_lines ? `${t.progress_lines} lines` : '';

    return `<div class="session-card${stalled?' stalled':''}${t.orphaned?' orphaned-card':''}" onclick="this.classList.toggle('expanded')">
      <div class="card-row">
        <span class="card-title">${t.id}</span>
        ${statusBadge}${backendBadge}${orphanBadge}
      </div>
      <div class="card-prompt">${escHtml(t.prompt_preview||'')}</div>
      <div class="card-meta">
        ${elapsed ? `⏱ ${elapsed}` : ''}
        ${stepsInfo ? `· ${stepsInfo}` : ''}
        ${stalled ? '· <span style="color:var(--accent-amber)">⚠ stalled</span>' : ''}
      </div>
      <div class="card-detail">${t.created_at ? `Created: ${fmtTime(t.created_at)}` : ''}</div>
    </div>`;
  }

  if (groupByProject) {
    // Group by backend as proxy for project (actual project_id not in task data)
    const groups = {};
    tasks.forEach(t => {
      const g = t.backend || 'unknown';
      if (!groups[g]) groups[g] = [];
      groups[g].push(t);
    });
    panel.innerHTML = Object.entries(groups).map(([g, ts]) =>
      `<div class="project-header">${g}</div>${ts.map(renderCard).join('')}`
    ).join('');
  } else {
    panel.innerHTML = tasks.map(renderCard).join('');
  }

  updateElapsedTimers();
}

// ============================================================
// Breadcrumbs panel
// ============================================================
function renderBreadcrumbs() {
  const panel = document.getElementById('breadcrumbs-panel');
  const data = state.servers.local;

  if (!data || !data.breadcrumbs) {
    // Try to render placeholder from manager data
    const mdata = state.servers.manager;
    if (mdata && mdata.status_bar) {
      const bc = mdata.status_bar.breadcrumb;
      panel.innerHTML = bc && bc !== 'none'
        ? `<div class="bc-card"><div class="card-row"><span class="card-title">${escHtml(bc)}</span></div><div class="card-meta">From manager status_bar</div></div>`
        : '<div class="empty-state">No active breadcrumbs</div>';
    } else {
      panel.innerHTML = '<div class="offline-card">Local offline — breadcrumb data unavailable</div>';
    }
    document.getElementById('bc-count').textContent = '';
    return;
  }

  const bcs = data.breadcrumbs || [];
  const active = bcs.filter(b => !b.aborted && b.steps_completed < b.total_steps);
  document.getElementById('bc-count').textContent = `${active.length} active`;

  if (active.length === 0) {
    panel.innerHTML = '<div class="empty-state">No active breadcrumbs</div>';
    return;
  }

  const now = Date.now();
  panel.innerHTML = active.map(b => {
    const pct = b.total_steps > 0 ? Math.round(b.steps_completed / b.total_steps * 100) : 0;
    const lastAct = b.last_activity_at ? new Date(b.last_activity_at).getTime() : 0;
    const staleSecs = lastAct ? Math.floor((now - lastAct) / 1000) : null;
    const stale = staleSecs !== null && staleSecs > 300;
    const staleLabel = staleSecs !== null ? (staleSecs < 60 ? `${staleSecs}s ago` : `${Math.floor(staleSecs/60)}m ago`) : '';

    return `<div class="bc-card${stale?' stale':''}">
      <div class="card-row">
        <span class="card-title">${escHtml(b.name||b.id)}</span>
        <span class="badge badge-running">${b.steps_completed}/${b.total_steps}</span>
      </div>
      <div class="bc-progress-bar"><div class="bc-progress-fill" style="width:${pct}%"></div></div>
      <div class="bc-meta">
        ${b.project_id ? `<span>📁 ${escHtml(b.project_id)}</span>` : ''}
        ${b.owner ? `<span>👤 ${escHtml(b.owner)}</span>` : ''}
        ${staleLabel ? `<span style="color:${stale?'var(--accent-amber)':'inherit'}">${staleLabel}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// Scorecard
// ============================================================
function renderScorecard() {
  const grid = document.getElementById('scorecard-grid');
  const mdata = state.servers.manager;
  const ldata = state.servers.local;

  const sessions = mdata?.sessions || {};
  const running = sessions.running || 0;
  const done = sessions.done || 0;
  const failed = sessions.failed || 0;
  const orphaned = sessions.orphaned || 0;
  const exeOld = ldata?.exe_old_count ?? '?';
  const extractions = mdata?.extractions_today ?? (ldata?.extractions_today ?? '?');

  const items = [
    { label: 'Running', value: running, cls: running > 0 ? 'good' : '' },
    { label: 'Done today', value: done, cls: done > 0 ? 'good' : '' },
    { label: 'Failed', value: failed, cls: failed > 0 ? 'warn' : '' },
    { label: 'Orphaned', value: orphaned, cls: orphaned > 0 ? 'warn' : '' },
    { label: 'Extractions', value: extractions, cls: '' },
    { label: '.exe.old', value: exeOld, cls: exeOld > 0 ? 'warn' : '' },
  ];

  grid.innerHTML = items.map(i =>
    `<div class="score-item"><div class="score-label">${i.label}</div><div class="score-value${i.cls?' '+i.cls:''}">${i.value}</div></div>`
  ).join('');
}

// ============================================================
// Service panels
// ============================================================
function renderHandsPanel() {
  const grid = document.getElementById('hands-grid');
  const age = document.getElementById('hands-age');
  const data = state.servers.hands;
  const seen = state.lastSeen.hands;

  if (seen) age.textContent = `${Math.floor((Date.now()-seen)/1000)}s ago`;

  if (!data || data._error) {
    grid.innerHTML = '<div class="offline-card" style="grid-column:1/-1">Hands offline</div>';
    return;
  }

  const rows = [
    ['Browser', data.browser_status || data.status || '—'],
    ['URL', data.current_url || data.url || '—'],
    ['Tabs', data.tab_count ?? data.tabs ?? '—'],
    ['Last action', data.last_action || '—'],
    ['Version', data.version || '—'],
    ['Uptime', data.uptime || '—'],
  ];
  grid.innerHTML = rows.map(([l,v]) =>
    `<span class="svc-label">${l}</span><span class="svc-value" title="${escHtml(String(v))}">${escHtml(String(v))}</span>`
  ).join('');
}

function renderAutonomousPanel() {
  const panel = document.getElementById('autonomous-panel');

// ============================================================
// Live elapsed timers
// ============================================================
function updateElapsedTimers() {
  document.querySelectorAll('[data-start]').forEach(el => {
    const start = new Date(el.dataset.start).getTime();
    if (!isNaN(start)) {
      el.textContent = fmtDuration(Date.now() - start);
    }
  });
}

// ============================================================
// Actions
// ============================================================
async function doAction(action) {
  const statusEl = document.getElementById('action-status');
  if (action === 'clean_old') {
    try {
      const r = await fetch('http://127.0.0.1:9101/api/action/clean_old', { method: 'POST' });
      const msg = r.ok ? 'Cleaned .exe.old files' : `Error ${r.status}`;
      statusEl.textContent = msg;
      showToast(msg);
    } catch(e) {
      statusEl.textContent = 'Local offline — cannot clean';
      showToast('Local server offline');
    }
  }
  setTimeout(() => statusEl.textContent = '', 5000);
}

function copyText(text) {
  navigator.clipboard?.writeText(text).then(() => showToast('Copied!'));
}

function toggleGitHub() {
  const menu = document.getElementById('github-menu');
  menu.style.display = menu.style.display === 'none' ? '' : 'none';
}

function openGH(server) {
  window.open(`https://github.com/${GITHUB_ORG}/${GITHUB_REPOS[server]}`, '_blank');
  document.getElementById('github-menu').style.display = 'none';
}

document.addEventListener('click', e => {
  const menu = document.getElementById('github-menu');
  if (!e.target.closest('#github-btn') && !e.target.closest('#github-menu')) {
    menu.style.display = 'none';
  }
});

// ============================================================
// Helpers
// ============================================================
function fmtDuration(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h${String(m%60).padStart(2,'0')}m`;
  if (m > 0) return `${m}m${String(s%60).padStart(2,'0')}s`;
  return `${s}s`;
}

function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString(); } catch { return iso; }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// Init
// ============================================================
boot();
document.getElementById('chip-all').classList.add('active');
</script>
